<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Space Invaders Game</title>

</head>

<body>
<main id="game-container">

<div id="game">

    <!-- HUD -->
    <div id="hud">

        <div id="score">
            Score: 0
        </div>

        <div id="lives">
            Lives: ❤️ ❤️ ❤️
        </div>

        <div id="timer-display">
            00:00
        </div>

    </div>

    <!-- Enemies will be created here -->
    <div id="enemy-container"></div>

    <!-- Bullets will be created here -->
    <div id="bullet-container"></div>
    
    <!-- Pause Menu -->
    <div id="pause-menu">
        
        <h4>
            Paused ⏸️
        </h4>
        
        <button id="continue-btn">
            Continue ➡️
        </button>
        
        <button id="restart-btn">
            Restart 🔄
        </button>
        
    </div>
    
    <!-- Game Over -->
    <div id="game-over">
        
        <h1>
            💀 GAME OVER
        </h1>
        
        <p>
            Final Score: 0
        </p>
        
        <button id="play-again">
            🔄 Play Again
        </button>
        
        
    </div>
    <!-- Player -->
    <div id="player">
         <img src="assets/player.png" >
    </div>


</div>

</main>
<script src="js/main.js" type="module"></script>
</body>

</html>
